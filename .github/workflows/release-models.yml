name: Release Models

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Model version tag (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch==2.3.1+cpu torchaudio==2.3.1+cpu --index-url https://download.pytorch.org/whl/cpu
          pip install faster-whisper==1.1.1 "pyannote.audio>=3.3.1" "huggingface-hub==0.25.2"

      - name: Download models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python download_models.py

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            TAG="${{ inputs.version }}"
          else
            TAG="v$(date +%Y%m%d)-${GITHUB_SHA::7}"
          fi
          SIZE=$(du -sh transcribe-models.tar.gz | cut -f1)

          gh release create "$TAG" \
            --title "Models $TAG" \
            --notes "ML models for the [confidant-transcriber](https://github.com/devdept-io/confidant-transcriber) CLI.

          **Contents:**
          - Whisper large-v3-turbo (faster-whisper)
          - pyannote speaker-diarization-3.1
          - pyannote segmentation-3.0
          - wespeaker-voxceleb-resnet34-LM

          **Size:** $SIZE compressed

          **Usage:** The transcribe executable downloads this automatically on first run.
          " \
            transcribe-models.tar.gz
