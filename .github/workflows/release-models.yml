name: Release Models

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Optional tag (e.g. v2.0.0). Leave empty to use the next semver after the latest v*.*.* release."
        required: false
        type: string

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release tag
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || '' }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$MANUAL_VERSION" ]; then
            echo "tag=$MANUAL_VERSION" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TAG="$(python3 << 'PY'
          import re
          import subprocess

          out = subprocess.run(
              ["git", "tag", "-l", "v*.*.*", "--sort=-v:refname"],
              capture_output=True,
              text=True,
              check=True,
          ).stdout
          tags = [
              t.strip()
              for t in out.splitlines()
              if re.fullmatch(r"v\d+\.\d+\.\d+", t.strip())
          ]
          if not tags:
              print("v1.0.0")
          else:
              m = re.fullmatch(r"v(\d+)\.(\d+)\.(\d+)", tags[0])
              major, minor, patch = (int(x) for x in m.groups())
              print(f"v{major}.{minor}.{patch + 1}")
          PY
          )"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch==2.3.1+cpu torchaudio==2.3.1+cpu --index-url https://download.pytorch.org/whl/cpu
          pip install faster-whisper==1.1.1 "pyannote.audio>=3.3.1" "huggingface-hub==0.25.2"

      - name: Download models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python download_models.py

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          SIZE=$(du -sh transcribe-models.tar.gz | cut -f1)

          gh release create "$TAG" \
            --title "Models $TAG" \
            --notes "ML models for the [confidant-transcriber](https://github.com/devdept-io/confidant-transcriber) CLI.

          **Contents:**
          - Whisper large-v3-turbo (faster-whisper)
          - pyannote speaker-diarization-3.1
          - pyannote segmentation-3.0
          - wespeaker-voxceleb-resnet34-LM

          **Size:** $SIZE compressed

          **Usage:** The transcribe executable downloads this automatically on first run.
          " \
            transcribe-models.tar.gz
